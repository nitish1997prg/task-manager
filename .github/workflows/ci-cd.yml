name: Task Manager CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '/assets/**'
      - '.github/**/*.md'

  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest and Supertest tests
        env: 
            JWT_SECRET: ${{secrets.JWT_SECRET}}
        run: npm test
    
  build-and-push:
    name: Build and Publish Docker Image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker Meta 
        id: meta 
        uses: docker/metadata-action@v6 
        with:
          images: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/task-manager/task-manager
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
      
      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-south1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      
      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v4
      
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{steps.meta.outputs.tags}}
          labels: ${{steps.meta.outputs.labels}}
  
  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
    
    steps:
        - name: Authenticate to Google Cloud
          uses: google-github-actions/auth@v3
          with:
            workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
            service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        - name: Deploy to Cloud Run
          id: deploy
          uses: google-github-actions/deploy-cloudrun@v2
          with:
            service: task-manager
            region: asia-south1
            image: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/task-manager/task-manager:latest
        
        - name: Show Service Url
          run: echo "🚀 ${{ steps.deploy.outputs.url }}"