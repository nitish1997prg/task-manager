version: "3.9"

services:
  app:
    build: .
    container_name: task-manager

    ports:
      - "3001:3001"

    environment:
      PORT: 3001
      JWT_SECRET: mySuperSecret
      MONGO_URI: mongodb://mongo:27017/taskmanager

    depends_on:
        mongo:
          condition: service_healthy

  mongo:
    image: mongo:8
    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db
    
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data: